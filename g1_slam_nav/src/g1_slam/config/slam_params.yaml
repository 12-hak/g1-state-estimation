slam_node:
  ros__parameters:
    # Finer voxel = higher accuracy map (0.2–0.3 typical for indoor)
    voxel_size: 0.25
    max_range: 15.0
    min_range: 0.3
    max_icp_iterations: 50
    odom_frame: "odom"
    base_frame: "base_link"
    map_frame: "map"
    map_publish_rate: 1.0
    keyframe_distance: 1.0
    keyframe_angle: 0.5
    loop_search_radius: 15.0
    enable_loop_closure: true
    # Only add to map + show "Loc: VALID" when scan is firmly locked to map.
    min_align_correspondences: 100
    max_align_fitness: 0.015
    min_overlap_ratio: 0.40
    # When blue map already exists: require definite overlay before adding more blue.
    min_overlap_ratio_existing_map: 0.45
    # "strict" = only add to map when scan is aligned (can lose loc). "motion" = always add from odom pose so blue map grows from movement/over-scan.
    map_build_mode: "motion"

occupancy_grid_node:
  ros__parameters:
    resolution: 0.05
    width: 200.0
    height: 200.0
    min_obstacle_height: 0.15
    max_obstacle_height: 2.0
    map_frame: "map"
    publish_rate: 1.0
    free_threshold: 0.3
    occupied_threshold: 0.65

map_manager_node:
  ros__parameters:
    map_directory: "/home/unitree/maps"
    map_frame: "map"
